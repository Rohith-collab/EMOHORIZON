<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Humanoid AI Tutor</title>
    <style>
      :root {
        --bg1: #0a0a1a;
        --bg2: #0f1025;
        --nova: #6d28d9;
        --electric: #00b7ff;
        --cyber: #00ff88;
        --card: rgba(255, 255, 255, 0.06);
        --card-border: rgba(255, 255, 255, 0.16);
        --text: #ffffff;
        --muted: #a1a1aa;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family:
          Inter,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        background:
          radial-gradient(
            80rem 50rem at 10% 10%,
            rgba(109, 40, 217, 0.15),
            transparent 60%
          ),
          radial-gradient(
            60rem 40rem at 90% 20%,
            rgba(0, 183, 255, 0.12),
            transparent 55%
          ),
          radial-gradient(
            70rem 50rem at 50% 100%,
            rgba(0, 255, 136, 0.12),
            transparent 60%
          ),
          linear-gradient(180deg, var(--bg1), var(--bg2));
        overflow-x: hidden;
      }

      /* Header */
      header {
        position: sticky;
        top: 0;
        z-index: 20;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.35),
          rgba(0, 0, 0, 0)
        );
        backdrop-filter: blur(6px);
      }

      .nav {
        max-width: 1200px;
        margin: 0 auto;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #e5e7eb;
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.15);
        padding: 8px 12px;
        border-radius: 8px;
        transition:
          background 0.2s ease,
          border-color 0.2s ease;
      }

      .back-link:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.25);
      }

      .title {
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: linear-gradient(
          90deg,
          rgba(109, 40, 217, 0.25),
          rgba(0, 183, 255, 0.25)
        );
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        font-size: 12px;
        color: #e5e7eb;
      }

      /* Layout */
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 20px 40px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
      }

      @media (min-width: 980px) {
        .grid {
          grid-template-columns: 1fr;
          gap: 28px;
        }
      }

      /* Card */
      .card {
        position: relative;
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
      }

      .card::before {
        content: "";
        position: absolute;
        inset: -2px;
        background: linear-gradient(
          135deg,
          rgba(109, 40, 217, 0.5),
          rgba(0, 183, 255, 0.5),
          rgba(0, 255, 136, 0.45)
        );
        filter: blur(18px);
        z-index: -1;
        opacity: 0.35;
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .card-title {
        font-weight: 700;
      }

      .card-sub {
        color: var(--muted);
        font-size: 14px;
      }

      .card-body {
        padding: 0;
      }

      /* D-ID Agent */
      #did-agent-container {
        width: 100%;
        height: 520px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.06),
          rgba(255, 255, 255, 0.02)
        );
      }

      /* Footer note */
      .footer {
        margin-top: 24px;
        color: var(--muted);
        font-size: 12px;
        text-align: center;
      }
      @media (max-width: 980px) {
        .container {
          padding: 18px 16px 32px;
        }

        .nav {
          padding: 10px 12px;
        }

        .card-header {
          padding: 12px 14px;
        }

        .card-title {
          font-size: 16px;
        }

        .card-sub {
          font-size: 13px;
        }

        #did-agent-container {
          height: 420px;
        }
      }

      @media (max-width: 600px) {
        .container {
          padding: 14px 12px 28px;
        }

        .nav {
          gap: 8px;
        }

        h1.title {
          font-size: 20px !important;
        }

        .grid {
          grid-template-columns: 1fr;
          gap: 16px;
        }

        /* Make the agent smaller and allow it to flex on small devices */
        #did-agent-container {
          height: 320px;
          min-height: 220px;
        }

        .card {
          border-radius: 12px;
        }
      }

      @media (max-width: 420px) {
        #did-agent-container {
          height: 260px;
        }

        .badge {
          font-size: 11px;
          padding: 5px 8px;
        }

        .back-link {
          padding: 6px 8px;
        }

        .title {
          font-size: 18px;
        }

        .footer {
          font-size: 12px;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <nav class="nav" aria-label="Top Navigation">
        <a href="/" class="back-link" aria-label="Go to home">← Home</a>
        <div>
          <span class="badge" aria-label="Mode">Humanoid AI Tutor</span>
        </div>
        <div style="width: 80px"></div>
      </nav>
    </header>

    <main class="container">
      <section aria-labelledby="page-title" style="margin-bottom: 12px">
        <h1
          id="page-title"
          class="title"
          style="font-size: 28px; margin: 0 0 6px 0"
        >
          Humanoid AI Tutor
        </h1>
        <p class="card-sub">
          Photorealistic AI tutor with natural conversation and emotions
        </p>
      </section>

      <div class="grid">
        <!-- Avatar / Agent -->
        <section class="card" aria-label="AI Humanoid Agent">
          <div class="card-header">
            <div>
              <div class="card-title">Live AI Avatar</div>
              <div class="card-sub">Powered by D-ID Web Agent</div>
            </div>
            <div class="badge" aria-hidden="true">Active</div>
          </div>
          <div class="card-body">
            <div
              id="did-agent-container"
              role="region"
              aria-label="D-ID Agent Container"
            ></div>
          </div>
        </section>
      </div>

      <p class="footer">
        If video doesn't load, refresh the page or check your network.
      </p>
    </main>

    <!-- D-ID Web Agent Integration (Full Mode) -->
    <script
      type="module"
      src="https://agent.d-id.com/v2/index.js"
      data-mode="full"
      data-client-key="Z29vZ2xlLW9hdXRoMnwxMDA5Mjc3MjEyNTg1MTc4MTQzNjA6bDJUYUdmT3loYVl5WlBkMUxuZElk"
      data-agent-id="v2_agt_aoxqaBin"
      data-name="did-agent"
      data-monitor="true"
      data-target-id="did-agent-container"
    ></script>
  </body>
</html>
